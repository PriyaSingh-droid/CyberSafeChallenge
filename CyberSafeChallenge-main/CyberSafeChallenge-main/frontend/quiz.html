<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybersecurity Quiz | CyberSafe Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-shell">
    <header class="site-header compact">
        <a class="brand" href="index.html"><span class="brand-mark">CS</span><span>CyberSafe Challenge</span></a>
        <nav class="nav-links" aria-label="Primary navigation">
            <a href="login.html">Simulation</a>
            <a class="active" href="quiz.html">Quiz</a>
            <a href="scenario.html">Scenario Lab</a>
            <a href="tips.html">Defense Guide</a>
        </nav>
    </header>

    <main class="quiz-layout">
        <aside class="quiz-sidebar">
            <p class="eyebrow">Module 2</p>
            <h1>Cyber readiness quiz</h1>
            <p>Choose the safest answer. You can go back, update choices, and submit when all questions are complete.</p>
            <div class="mini-stats">
                <div><strong id="answeredCount">0</strong><span>Answered</span></div>
                <div><strong id="remainingCount">15</strong><span>Remaining</span></div>
            </div>
        </aside>

        <section class="quiz-card">
            <div class="quiz-meta">
                <p id="questionNumber">Question 1 of 15</p>
                <span id="categoryLabel">Basics</span>
            </div>
            <div class="progress" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>
            <h2 id="question">Loading...</h2>
            <div id="answers" class="answer-list"></div>
            <div class="quiz-buttons">
                <button class="btn secondary" id="prevBtn" type="button">Previous</button>
                <button class="btn primary" id="nextBtn" type="button">Next</button>
            </div>
        </section>
    </main>

    <script src="js/participant.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
