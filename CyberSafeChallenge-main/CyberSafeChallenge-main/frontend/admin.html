<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Dashboard | CyberSafe Challenge</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head>
<body class="app-shell"><header class="site-header compact"><a class="brand" href="index.html"><span class="brand-mark">CS</span><span>CyberSafe Challenge</span></a><nav class="nav-links"><a href="quiz.html">Quiz</a><a href="leaderboard.html">Leaderboard</a></nav></header>
<main class="admin-layout"><section class="auth-card" id="adminLogin"><p class="eyebrow">Administrator access</p><h1>Sign in to dashboard</h1><form id="adminLoginForm"><label for="adminUsername">Username</label><input id="adminUsername" type="text" required><label for="adminPassword">Password</label><input id="adminPassword" type="password" required><p id="adminMessage" class="form-message"></p><button class="btn primary full" type="submit">Sign In</button></form></section>
<section id="adminDashboard" hidden><div class="dashboard-heading"><div><p class="eyebrow">Competition control</p><h1>Admin Dashboard</h1></div><button id="exportButton" class="btn primary" type="button">Export Player Results</button></div><div class="dashboard-grid" id="dashboardGrid"></div><div class="chart-grid"><section class="chart-card"><h2>Player Scores</h2><canvas id="scoreChart"></canvas></section><section class="chart-card"><h2>Completion Rate</h2><canvas id="completionChart"></canvas></section><section class="chart-card"><h2>Score Trend</h2><canvas id="trendChart"></canvas></section></div><section class="table-card"><div class="table-toolbar"><div><p class="eyebrow">Sessions</p><h2>Players</h2></div><input id="participantSearch" type="search" placeholder="Search player or competition code"></div><div class="table-wrap"><table><thead><tr><th>Player</th><th>Session ID</th><th>Competition Code</th><th>Created</th></tr></thead><tbody id="participantBody"></tbody></table></div></section></section></main><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="js/admin.js"></script></body></html>
